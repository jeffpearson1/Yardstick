url: https://public-cdn.cloud.unity3d.com/hub/prod/UnityHubSetup-x64.exe
urlRedirects: false
preDownloadScript: |
  using module .\Modules\VersionPro.psm1
  $vURL = "https://unity.com/unity-hub/release-notes"
  $content = Invoke-WebRequest $vURL
  $content.content -match "(?<=/unity-hub/release-notes#)([0-9]{1,3}\.{0,1}){3}" | Out-Null
  $version = $matches[0]
  $fileDetectionVersion = ([VersionPro]$Version).ToString(4)
fileName: UnityHubSetup.exe
installScript: UnityHubSetup.exe /S
uninstallScript: |
 "C:\Program Files\Unity Hub\Uninstall Unity Hub.exe" /S
iconFile: unityhub.png
id: unityhub
displayName: Unity Hub
publisher: Unity
description:  The world's most popular development platform for creating 2D and 3D multiplatform games and interactive experiences.
detectionType: file
fileDetectionPath: 'C:\Program Files\Unity Hub'
fileDetectionName: 'Unity Hub.exe'
fileDetectionMethod: version
fileDetectionOperator: greaterThanOrEqual
numVersionsToKeep: 2
installExperience: system
restartBehavior: suppress
minOSVersion: W10_20H2
