base: 7zip
preDownloadScript: |
  using module .\Modules\Custom\GithubDownloader.psm1
  using module .\Modules\VersionPro.psm1
  $downloadFileRegex = "7z[0-9]{3,5}-arm64\.exe$"
  $versionRegex = "(\.{0,1}[0-9]{1,2}){2,4}"
  $Script:downloader = [GithubDownloader]::new($URL, $downloadFileRegex, $versionRegex)
  $downloader.Update()
  $Version = $downloader.LatestVersion
  $URL = $downloader.URL
  $filename = $downloader.filename
  $fileDetectionVersion = ([VersionPro]$Version).ToString(4)
installScript: '"<filename>" /S'
uninstallScript: '"%ProgramFiles%\7-Zip\Uninstall.exe" /S'
id: 7zip.arm64
displayName: 7-Zip (ARM64)
detectionType: file
fileDetectionPath: '%ProgramFiles%\7-Zip'
fileDetectionName: 7z.exe
fileDetectionMethod: version
fileDetectionOperator: equal
 