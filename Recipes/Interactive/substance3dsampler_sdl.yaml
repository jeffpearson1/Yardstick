base: substance3dsampler
id: Substance3DSampler_SDL
displayName: Substance 3D Sampler (Shared Device License)
description: Licensed for lab use only. Individuals should download the non-shared device license installer. Substance 3D Sampler allows you to create and iterate on material collections by tweaking and mixing existing materials, or by extracting new materials from scans (single or multiple images).
preDownloadScript: |
  using module .\Modules\Custom\AdobeDownloader.psm1
  $Script:Substance3DSampler = [AdobeApplication]::new(@{
    Name = "Substance 3D Sampler"
    ID = "Substance3DSampler_SDL"
    URL = $URL
    VersionMatchStringRegex = "(?<=\>)(\.{0,1}[0-9]{1,4}){2,4}"
    PackageName = "Auto_Substance3DSampler_<Version>_SD_NAU"
    InstallType = "ManagedSDL"
  })

  $Script:Substance3DSampler.Update()
  $Version = $Substance3DSampler.Version
  $PackageName = $Substance3DSampler.PackageName
  $InstallScript = $Substance3DSampler.InstallScript
  $UninstallScript = $Substance3DSampler.UninstallScript
downloadScript: |
  $Script:Substance3DSampler.Download()
scopeTags:
  - scopeTag2
versionLock: 0.x
