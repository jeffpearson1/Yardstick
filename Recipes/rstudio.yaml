url: https://www.rstudio.com/wp-content/downloads.json
urlRedirects: false
preDownloadScript: |
  $json = Invoke-WebRequest $url | ConvertFrom-Json
  $version = $json.rstudio.open_source.stable.version
  $url = $json.rstudio.open_source.stable.desktop.installer.windows.url
  $sha256 = $json.rstudio.open_source.stable.desktop.installer.windows.sha256
  $parts = $($version.split("+")[0]).split(".")
  $fileDetectionVersion = "$($parts[0]).$($parts[1].trimstart('0')).$($parts[2]).0"
installScript: <filename> /S
uninstallScript: '"%ProgramFiles%\RStudio\Uninstall.exe" /S'
iconFile: rstudio.png
id: rstudio
displayName: RStudio
publisher: Posit
description: RStudio is an integrated development environment (IDE) for R.
detectionType: file
fileDetectionPath: '%ProgramFiles%\RStudio'
fileDetectionName: rstudio.exe
fileDetectionMethod: version
fileDetectionOperator: equal
scopeTags:
  - scopeTag1
  - scopeTag2
