url: https://github.com/ip7z/7zip
urlRedirects: false
preDownloadScript: |
  using module .\Modules\Custom\GithubDownloader.psm1
  using module .\Modules\VersionPro.psm1
  $downloadFileRegex = "7z[0-9]{3,5}-x64\.msi$"
  $versionRegex = "(\.{0,1}[0-9]{1,2}){2,4}"
  $Script:downloader = [GithubDownloader]::new($URL, $downloadFileRegex, $versionRegex)
  $downloader.Update()
  $Version = $downloader.LatestVersion
  $URL = $downloader.URL
  $filename = $downloader.filename
  $fileDetectionVersion = ([VersionPro]$Version).ToString(4)
installScript: msiexec /i <filename> /qn /norestart
uninstallScript: msiexec /x <productcode> /qn /norestart
iconFile: 7zip.png
id: 7zip
displayName: 7-Zip
publisher: Igor Pavlov
description: An open source file archiver/unarchiver
fileType: MSI
softwareName: "7-Zip*"
detectionType: msi
numVersionsToKeep: 2
scopeTags:
  - scopeTag1
  - scopeTag2
